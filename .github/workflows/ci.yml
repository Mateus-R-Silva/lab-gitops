name: Verificacao-Sintaxe
on: [push] # O robô acorda em todo push

jobs:
  check-python:
    runs-on: ubuntu-latest # O GitHub liga uma máquina Linux para testar
    steps:
      - uses: actions/checkout@v3 # Baixa seu código na máquina de teste
      
      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Instalar Verificador (flake8)
        run: pip install flake8
        
      - name: Validar Sintaxe
        run: |
          # Este comando varre seu app.py em busca de erros de digitação
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics